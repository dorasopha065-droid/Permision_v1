<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Attendance Portal</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Glow Background Blobs -->
    <div class="glow-blob glow-1"></div>
    <div class="glow-blob glow-2"></div>

    <!-- Toast Notification Area -->
    <div id="alertBanner" class="alert-banner alert-danger">
        <span id="alertIcon">⚠️</span>
        <span id="alertMessage">Error Message Here</span>
    </div>

    <div class="container">
        <div class="glass-card">
            <!-- Language Selector Dropdown -->
            <div class="lang-selector-container">
                <select id="langSelect" class="lang-select">
                    <option value="en">EN</option>
                    <option value="km">KM</option>
                </select>
            </div>

            <h1 id="appTitle">Attendance System</h1>
            <p id="appSubtitle" class="subtitle">Enter credentials to access your dashboard</p>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label id="lblUsername" for="username">Username</label>
                    <div class="input-wrapper">
                        <!-- Icon -->
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </span>
                        <input 
                            type="text" 
                            id="username" 
                            class="form-control" 
                            placeholder="Enter your username" 
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label id="lblPassword" for="password">Password</label>
                    <div class="input-wrapper">
                        <!-- Icon -->
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </span>
                        <input 
                            type="password" 
                            id="password" 
                            class="form-control" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary">
                    <span id="btnText">Sign In</span>
                    <div id="btnSpinner" class="spinner hidden"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- Client-side Logic Script -->
    <script src="/js/login.js"></script>
</body>
</html>
